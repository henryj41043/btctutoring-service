name: Build and Deploy Service to ECS

on:
  push:
    branches:
      - main

env:
  ECR_IMAGE: ${{ vars.ECR_IMAGE }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  test:
    name: Tests + coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Unit + integration tests with 95% coverage gate
        run: npm run test:cov
      - name: End-to-end tests (mocked AWS + DynamoDB)
        run: npm run test:e2e

  deploy:
    # Nothing ships to ECS unless every test suite passes.
    needs: test
    runs-on: ubuntu-latest
    # OIDC: assume the btctutoring-github-deploy role instead of static keys.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU for arm64
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: runner.os == 'Linux'

      - name: Set up Docker for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: btctutoring/btctutoring-service
          IMAGE_TAG: ${{ vars.ECR_IMAGE }}
        run: |
          docker buildx create --name builder --use
          docker buildx build --platform linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --push .

      # Targets the CDK-managed cluster/service (btctutoring-infra). The task
      # role provides AWS access at runtime — no static keys in the container.
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster btctutoring \
            --service btctutoring-service \
            --force-new-deployment \
            --region "${{ vars.AWS_DEFAULT_REGION }}"
